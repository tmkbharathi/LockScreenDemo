# .github/workflows/build-installer.yml
name: Build & Package Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

permissions:
  contents: write

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install .NET SDK 10
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 3. Restore dependencies
      - name: Restore dependencies
        run: dotnet restore LockScreenDemo.slnx

      # 4. Publish C# projects to .\publish
      - name: Publish Binaries
        run: |
          dotnet publish LockScreenDemo.Service/LockScreenDemo.Service.csproj -c Release -o .\publish --self-contained false /p:UseSharedCompilation=false
          dotnet publish LockScreenDemo.Agent/LockScreenDemo.Agent.csproj -c Release -o .\publish --self-contained false /p:UseSharedCompilation=false
          dotnet publish LockScreenDemo.Viewer/LockScreenDemo.Viewer.csproj -c Release -o .\publish --self-contained false /p:UseSharedCompilation=false

      # 5. Compile Inno Setup Script
      - name: Compile Inno Setup Installer
        run: iscc installer.iss

      # 6. Upload compiled installer .exe as run artifact
      - name: Upload Setup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LockScreenDemoInstaller
          path: Output\LockScreenDemoSetup.exe
          if-no-files-found: error

      # 7. Create GitHub Release and Upload Installer (only on tags)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/LockScreenDemoSetup.exe
          generate_release_notes: true
